name: Build Highly Optimized APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Inject Aggressive Size Optimization Flags
        run: |
          echo "android.enableR8=true" >> gradle.properties
          sed -i '/buildTypes {/a \
                  release {\n\
                      minifyEnabled true\n\
                      shrinkResources true\n\
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")\n\
                  }' app/build.gradle || true

      - name: Build Minified Release APK
        run: ./gradlew assembleRelease

      - name: Upload Smallest APK File
        uses: actions/upload-artifact@v4
        with:
          name: Droidcord-Optimized-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
